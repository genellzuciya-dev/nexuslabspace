<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Message Received — Nexus Lab Space</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060C08;--lime:#B6FF4A;--cream:#F2EDDF;--muted:#8A8478;--border:rgba(182,255,74,0.18)}
body{background:var(--bg);color:var(--cream);font-family:'Instrument Serif',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
.tag{font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.3em;color:var(--lime);text-transform:uppercase;display:block;margin-bottom:2rem}
h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,5vw,4rem);line-height:1;letter-spacing:-0.02em;color:var(--cream);margin-bottom:1.5rem}
h1 em{font-style:italic;font-family:'Instrument Serif',serif;color:var(--lime)}
p{font-size:1.1rem;color:var(--muted);line-height:1.8;max-width:480px;margin:0 auto 3rem}
.box{border:1px solid var(--border);padding:4rem 3rem;max-width:560px;width:100%}
.mono{font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:0.1em;margin-top:1rem}
a{font-family:'Syne',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--bg);background:var(--lime);padding:0.95rem 2rem;text-decoration:none;display:inline-block;margin-top:2rem}
</style>
</head>
<body>
<div class="box">
  <span class="tag">Message Received</span>
  <h1>Thank you.<br/><em>We'll be in touch.</em></h1>
  <p>Every system shifts with a single first move.</p>
  <a href="https://genellzuciya-dev.github.io/nexuslabspace/">Back to Nexus</a>
</div>
</body>
</html>
